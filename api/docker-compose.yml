services:
  postgres:
    image: postgres:16-alpine
    container_name: project_tracker_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: project_tracker
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - dac_network

  redis:
    image: redis:7-alpine
    container_name: project_tracker_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - dac_network

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: project_tracker_api
    ports:
      - "8080:8080"
    environment:
      - SERVER_PORT=8080
      - SERVER_HOST=0.0.0.0
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - DB_NAME=project_tracker
      - DB_SSLMODE=disable
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=
      - REDIS_DB=0
      - JWT_SECRET=sua-chave-secreta-super-segura-aqui
      - JWT_EXPIRATION_HOURS=24
      - CORS_ALLOWED_ORIGINS=http://localhost:3000,https://dac.kodjao.xyz
      - LOG_LEVEL=debug
      - LOG_FORMAT=json
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - dac_network

volumes:
  postgres_data:
  redis_data:

networks:
  dac_network:
    driver: bridge
